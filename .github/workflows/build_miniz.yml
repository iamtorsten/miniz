name: Manual Build for Miniz

on:
  workflow_dispatch: # Nur manuell ausführbar

jobs:
  build:
    strategy:
      matrix:
        platform: [linux, macos, windows]
        arch: [x86_64, arm64]
    runs-on: ${{ matrix.platform == 'windows' && 'windows-latest' || matrix.platform == 'macos' && 'macos-latest' || 'ubuntu-22.04' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Build Environment (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Setting up environment for Linux ${{ matrix.arch }}"
          sudo apt-get update
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y gcc
          fi

      - name: Setup Build Environment (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Setting up environment for macOS ${{ matrix.arch }}"

      - name: Setup Build Environment (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Setting up environment for Windows ${{ matrix.arch }}"
          choco install mingw

      - name: Build Miniz (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "Starting build for Windows ${{ matrix.arch }}"
          mkdir -Force -Path build\windows_${{ matrix.arch }}
          if ($env:matrix_arch -eq "arm64") {
            & aarch64-w64-mingw32-gcc -shared -o build\windows_${{ matrix.arch }}\miniz.dll miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
          } else {
            & x86_64-w64-mingw32-gcc -shared -o build\windows_${{ matrix.arch }}\miniz.dll miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
          }

      - name: Build Miniz (Linux and macOS)
        if: runner.os != 'Windows'
        run: |
          echo "Starting build for ${{ matrix.platform }} ${{ matrix.arch }}"
          mkdir -p build/${{ matrix.platform }}_${{ matrix.arch }}
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              aarch64-linux-gnu-gcc -shared -o build/${{ matrix.platform }}_${{ matrix.arch }}/miniz.so miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
            else
              gcc -shared -o build/${{ matrix.platform }}_${{ matrix.arch }}/miniz.so miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
            fi
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              clang -target arm64-apple-macos -shared -o build/${{ matrix.platform }}_${{ matrix.arch }}/miniz.dylib miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
            else
              clang -target x86_64-apple-macos -shared -o build/${{ matrix.platform }}_${{ matrix.arch }}/miniz.dylib miniz.c miniz_tdef.c miniz_tinfl.c -DBUILD_DLL
            fi
          fi

      - name: List Build Output
        run: |
          echo "Listing build output for ${{ matrix.platform }} ${{ matrix.arch }}"
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            Get-ChildItem -Path build\windows_${{ matrix.arch }} -Recurse
          else
            ls -la build/${{ matrix.platform }}_${{ matrix.arch }}
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Miniz-Build-${{ matrix.platform }}-${{ matrix.arch }}
          path: build/${{ matrix.platform }}_${{ matrix.arch }}
